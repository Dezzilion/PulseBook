version: '3.9'

services:
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: pulsebook-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      # Додайте DATABASE_URL, якщо використовуєте Prisma/PostgreSQL
    volumes:
      - ./backend/auth-service:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulsebook-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://auth-service:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth-service
    restart: unless-stopped